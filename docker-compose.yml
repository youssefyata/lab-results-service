services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lab-results-ingest-service
    restart: unless-stopped
    network_mode: host
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/lab_ingest?allowPublicKeyRetrieval=true&useSSL=false&useLegacyDatetimeCode=false&serverTimezone=UTC&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: phpmyadmin
      SPRING_DATASOURCE_PASSWORD: yataPassword@123
      SERVER_PORT: 11001
      SPACE_KEY: ${SPACE_KEY:-}
      SPACE_SECRET: ${SPACE_SECRET:-}
      SPACE_ENDPOINT: ${SPACE_ENDPOINT:-https://fra1.digitaloceanspaces.com}
      SPACE_REGION: ${SPACE_REGION:-us-east-1}
      SPACE_BUCKET: ${SPACE_BUCKET:-yata-medias}